name: deploy-dev

on:
  workflow_run:
    workflows: [build-and-push-image]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download version artifact
        uses: actions/download-artifact@v4
        with:
          name: version
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Get version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/learn-tbd:$VERSION" >> $GITHUB_OUTPUT

      - name: 📋 Show deployment plan
        run: |
          echo "═══════════════════════════════════════════"
          echo "  🚀 DEV DEPLOYMENT SIMULATION"
          echo "═══════════════════════════════════════════"
          echo ""
          echo "📦 Image Details:"
          echo "   Version:  ${{ steps.version.outputs.version }}"
          echo "   Full Tag: ${{ steps.version.outputs.image }}"
          echo ""
          echo "🔄 Deployment Steps:"
          echo "   1. Pull image: docker pull ${{ steps.version.outputs.image }}"
          echo "   2. Stop old:   docker stop learn-tbd-dev || true"
          echo "   3. Remove:     docker rm learn-tbd-dev || true"
          echo "   4. Run new:    docker run -d --name learn-tbd-dev ${{ steps.version.outputs.image }}"
          echo "   5. Verify:     docker ps | grep learn-tbd-dev"
          echo ""
          echo "═══════════════════════════════════════════"

      - name: 🔍 Verify image on Docker Hub
        run: |
          echo "Checking if image exists on Docker Hub..."
          if docker manifest inspect ${{ steps.version.outputs.image }} > /dev/null 2>&1; then
            echo "✅ Image found: ${{ steps.version.outputs.image }}"
          else
            echo "⚠️  Image not found (push may still be in progress)"
          fi

      - name: 📊 Show image metadata (simulated)
        run: |
          echo ""
          echo "Simulated Container Info:"
          echo "  Container ID: sim_$(echo ${{ steps.version.outputs.version }} | md5sum | cut -c1-12)"
          echo "  Name: learn-tbd-dev"
          echo "  Image: ${{ steps.version.outputs.image }}"
          echo "  Status: Running"
          echo "  Ports: 8080/tcp (simulated)"
          echo ""
          echo "✅ Deployment simulation completed successfully"

      - name: 📝 Create deployment summary
        run: |
          echo "## 🚀 Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.version.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Deployed to dev environment" >> $GITHUB_STEP_SUMMARY
